services:
  - type: web
    name: casifly
    env: node
    region: oregon
    buildCommand: npm run build:deploy
    startCommand: npm run start:deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: USE_FIRESTORE
        value: "true"
      # FIREBASE_SERVICE_ACCOUNT: Add via Render Dashboard (full JSON string from Firebase Console)
